name: Update Pages on release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to mirror to docs/index.html (e.g. v0.2.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  update-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # `release: published` checks out the tag by default (detached HEAD),
          # which makes the trailing `git push` fail. Pin to main so both
          # release-trigger and workflow_dispatch behave the same.
          ref: main

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "value=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download agent asset from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          mkdir -p /tmp/agent
          gh release download "$TAG" \
            --pattern 'fudebako-agent-*.html' \
            --dir /tmp/agent
          downloaded=$(ls /tmp/agent/fudebako-agent-*.html 2>/dev/null | head -1)
          if [ -z "$downloaded" ]; then
            echo "::error::No fudebako-agent-*.html asset found in release $TAG"
            exit 1
          fi
          mv "$downloaded" docs/index.html
          echo "Wrote $(stat -c%s docs/index.html) bytes to docs/index.html"

      - name: Commit and push if changed
        env:
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          if git diff --staged --quiet; then
            echo "docs/index.html unchanged — skipping commit"
            exit 0
          fi
          git commit -m "chore(pages): update docs/index.html to $TAG"
          git push
